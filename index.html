<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apple Security Scanner</title>

<link rel="manifest" href="manifest.json">

<style>
body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont;
    background: #000;
    color: #fff;
    text-align: center;
}

h1 {
    margin-top: 20px;
}

.container {
    padding: 20px;
}

input {
    width: 92%;
    padding: 12px;
    margin: 6px 0;
    background: #111;
    border: 1px solid #333;
    color: white;
    border-radius: 10px;
}

button {
    margin-top: 10px;
    padding: 12px 20px;
    background: white;
    color: black;
    border: none;
    border-radius: 10px;
    font-weight: bold;
}

#terminal {
    margin-top: 20px;
    text-align: left;
    background: #000;
    padding: 15px;
    height: 260px;
    overflow-y: auto;
    border: 1px solid #333;
    font-family: monospace;
}

#progressBar {
    width: 90%;
    height: 10px;
    background: #222;
    margin: 15px auto;
    border-radius: 10px;
}

#progress {
    height: 100%;
    width: 0%;
    background: lime;
    border-radius: 10px;
}

.small {
    font-size: 12px;
    color: #aaa;
}
</style>
</head>

<body>

<h1>Security Scanner</h1>
<div class="small">Security scanner by Apple support </div>

<div class="container">
    <input placeholder="Name">
    <input placeholder="Email">
    <input placeholder="Phone">
    <input placeholder="IP Address">

    <button onclick="startScan()">Run Scan</button>

    <div id="progressBar"><div id="progress"></div></div>

    <div id="terminal"></div>
</div>

<script>
const terminal = document.getElementById("terminal");

function typeLine(text, delay = 30) {
    return new Promise(resolve => {
        let i = 0;
        let line = "";
        function typing() {
            if (i < text.length) {
                line += text[i];
                terminal.innerHTML += text[i];
                i++;
                setTimeout(typing, delay);
            } else {
                terminal.innerHTML += "<br>";
                resolve();
            }
        }
        typing();
    });
}

function random(min, max) {
    return Math.floor(Math.random() * (max - min) + min);
}

async function startScan() {
    terminal.innerHTML = "";
    let progress = document.getElementById("progress");

    let steps = [
        "Initializing secure scan...",
        "Connecting to network nodes...",
        "Analyzing IP routes...",
        "Scanning ports...",
        "Detecting malware signatures...",
        "Checking firewall status...",
        "Analyzing suspicious connections...",
        "Finalizing report..."
    ];

    for (let i = 0; i < steps.length; i++) {
        await typeLine("> " + steps[i]);
        progress.style.width = ((i + 1) / steps.length) * 100 + "%";
        await new Promise(r => setTimeout(r, 600));
    }

    let hackers = random(1, 5);
    let viruses = random(0, 3);
    let security = ["Low", "Medium", "High"][random(0, 3)];

    await typeLine("");
    await typeLine("----- Final REPORT (network Data) -----");
    await typeLine("Threat connections: " + hackers);
    await typeLine("Security level: " + security);
    await typeLine("Malware detected: " + viruses);
    await typeLine("IP activity: Sample global routing simulation");
}
</script>

</body>
</html>
